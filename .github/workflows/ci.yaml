name: CI
on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  RUST_TOOLCHAIN: stable
  TOOLCHAIN_PROFILE: minimal

jobs:
  # ── Rust: formatting ──────────────────────────────────────────
  rustfmt:
    name: Check Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  # ── Rust: clippy ──────────────────────────────────────────────
  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo clippy
        run: cargo clippy --all-features -- -D warnings

  # ── Rust: tests (with PostgreSQL + Redis + MinIO) ─────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - "6379:6379"
      postgres:
        image: postgres
        env:
          POSTGRES_DB: postgres_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:latest server /data

          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/ready; then
              exit 0
            fi
            sleep 2
          done

          docker logs minio
          exit 1
      - name: Create MinIO test bucket
        run: |
          docker run --rm --network host \
            quay.io/minio/mc:latest /bin/sh -c "
            mc alias set local http://localhost:9000 minioadmin minioadmin;
            mc mb --ignore-existing local/knota-fold-test;
            exit 0;
            "
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo test (all tests including previously-ignored)
        run: cargo test --all-features --all -- --include-ignored
        env:
          REDIS_URL: redis://localhost:${{job.services.redis.ports[6379]}}
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres_test
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: knota-fold-test
          S3_FORCE_PATH_STYLE: true
          S3_REGION: us-east-1

  
